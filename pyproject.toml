[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = [
    "E",
    "W",
    "F",
    "I",
    "UP",
    "B",
    "BLE",
    "PL",
    "SIM",
    "PERF",
    "C4",
    "PTH",
    "A",
    "G",
    "RSE",
    "RET",
    "T20",
    "ISC",
    "ASYNC",
    "PIE",
    "PT",
    "RUF100",
]
ignore = [
    "E501",
    "PLR2004",
    "PLR0912",
    "PLR0913",
    "PLR0915",
    "PLR1702",
    "PLW2901",
    "TC001",
    "TC002",
    "TC003",
    "RUF002",
    "RUF003",
    "UP041",
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["F401", "F811", "PLC0415"]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
warn_unused_ignores = true
warn_return_any = false
